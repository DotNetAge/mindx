# =============================================================================
# MindX Docker Compose — Development & Production
# =============================================================================
#
# Version is auto-generated from git tag by `make docker` (writes .env):
#   MINDX_VERSION  = $(git describe --tags)   e.g. v2.2.0 or dev
#   MINDX_COMMIT   = $(git rev-parse --short) e.g. a1b2c3d
#   MINDX_BUILD_TIME = UTC timestamp
#
# Usage:
#   make docker              # Generate .env from git → Build + Up
#   docker compose up -d     # Start daemon (reads .env)
#   docker compose down      # Stop and remove
#   docker compose logs -f   # Tail logs
#
# Manual .env example:
#   MINDX_VERSION=v2.2.0
#   DEEPSEEK_API_KEY=sk-xxx
# =============================================================================

services:
  mindx:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${MINDX_VERSION:-dev}
        COMMIT: ${MINDX_COMMIT:-unknown}
        BUILD_TIME: ${MINDX_BUILD_TIME:-unknown}
    image: mindx:${MINDX_VERSION:-dev}
    container_name: ${COMPOSE_PROJECT_NAME:-mindx}-daemon
    ports:
      - "${MINDX_WEB_PORT:-1313}:1313" # Web UI (HTTP)
      - "${MINDX_WS_PORT:-1314}:1314" # WebSocket Gateway
    volumes:
      # Workspace shared with host
      - ./workspaces:/home/mindx/workspaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1313/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
