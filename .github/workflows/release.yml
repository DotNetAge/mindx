# =============================================================================
# MindX Release Pipeline — Automated GitHub Releases + All Package Managers
# =============================================================================
# Trigger: push of version tags (v*)
#
# Pipeline:
#   prepare → build(4 platforms: linux/amd64, linux/arm64, darwin/amd64, darwin/arm64) → release(GH Release)
#     ├── docker         → GHCR + Docker Hub (stable only)
#     ├── homebrew      → DotNetAge/homebrew-mindx tap
#     ├── linux-packages→ AppImage + .deb (attached to GH Release)
#     ├── snap          → Snap Store (stable only)
#     └── flatpak       → Flathub PR (stable only)
#
# Usage:
#   git tag v2.2.0 && git push origin v2.2.0
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.26'
  BINARY_NAME: mindx
  GITHUB_REPO: ${{ github.repository }}
  HOMEBREW_TAP: 'DotNetAge/homebrew-mindx'

jobs:
  # ==========================================================================
  # Prepare — extract version from tag, generate release notes
  # ==========================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
      notes: ${{ steps.notes.outputs.content }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_num=${TAG#v}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing: $TAG (prerelease=$( [[ "$TAG" == *-* ]] && echo yes || echo no ))"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          CONTENT="## MindX ${{ steps.version.outputs.version }}\n\n"

          if [ -n "$PREV_TAG" ]; then
            CONTENT="${CONTENT}### Changes since ${PREV_TAG}\n\n"
            CONTENT+="\`\`\`\n"
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" --no-merges >> /tmp/notes.txt 2>/dev/null || true
            if [ -s /tmp/notes.txt ]; then
              CONTENT+="$(cat /tmp/notes.txt)"
            else
              CONTENT+="- Initial release or no commits since last tag"
            fi
            CONTENT+="\n\`\`\`\n"
          else
            CONTENT+="- Initial release\n"
          fi

          CONTENT+="\n---\n\n"
          CONTENT+="| Platform | Architecture | File |\n"
          CONTENT+="|----------|-------------|------|\n"
          CONTENT+="| Linux | amd64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-linux-amd64.tar.gz\` |\n"
          CONTENT+="| Linux | arm64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-linux-arm64.tar.gz\` |\n"
          CONTENT+="| macOS (Intel) | amd64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-darwin-amd64.tar.gz\` |\n"
          CONTENT+="| macOS (Apple Silicon) | arm64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-darwin-arm64.tar.gz\` |\n"

          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  # ==========================================================================
  # Build — cross-compile all platforms in parallel
  # ==========================================================================
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ''
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install musl cross-compiler
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          # For arm64: install zig as cross-compiler fallback (musl.cc often unreachable from CI)
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            if ! command -v aarch64-linux-musl-gcc &>/dev/null; then
              echo "aarch64-linux-musl-gcc not found, installing zig..."
              ZIG_VER="0.13.0"
              wget -q "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz" -O /tmp/zig.tar.xz
              sudo tar xf /tmp/zig.tar.xz -C /usr/local
              sudo ln -sf /usr/local/zig-linux-x86_64-${ZIG_VER}/zig /usr/local/bin/zig
              rm /tmp/zig.tar.xz
              zig version
            fi
          fi

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          # Set musl cross-compiler for Linux (Alpine Docker image uses musl)
          if [ "$GOOS" = "linux" ]; then
            if [ "$GOARCH" = "amd64" ]; then
              export CC=x86_64-linux-musl-gcc
            elif [ "$GOARCH" = "arm64" ]; then
              # Use native musl-gcc if available, otherwise fall back to zig
              if command -v aarch64-linux-musl-gcc &>/dev/null; then
                export CC=aarch64-linux-musl-gcc
              else
                export CC="zig cc -target aarch64-linux-musl"
              fi
            fi
          fi
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          mkdir -p dist

          go build \
            -trimpath \
            -ldflags="-s -w \
              -X github.com/DotNetAge/mindx/internal/core.Version=${VERSION_NUM} \
              -X github.com/DotNetAge/mindx/internal/core.Commit=${COMMIT} \
              -X github.com/DotNetAge/mindx/internal/core.BuildTime=${BUILD_TIME}" \
            -o dist/${{ env.BINARY_NAME }}${{ matrix.ext }} \
            .

          ls -lh dist/

      - name: Package (tar.gz)
        shell: bash
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          cd dist
          tar czf "../${{ env.BINARY_NAME }}-${VERSION_NUM}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "${{ env.BINARY_NAME }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
          retention-days: 1

  # ==========================================================================
  # Release — create GitHub Release with all assets + checksums
  # ==========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: packages
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd packages
          shasum -a 256 *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: MindX ${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.notes }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            packages/*.tar.gz
            packages/*.zip
            packages/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Docker — build & push to Docker Hub (public) + GHCR (stable only)
  #
  # Requires Secrets:
  #   DOCKERHUB_USERNAME  — Your Docker Hub username
  #   DOCKERHUB_TOKEN     — Access Token (not password!)
  #                         Get: https://hub.docker.com/settings/security
  #                         → New Access Token → Read & Write → Generate
  # ==========================================================================
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.is_prerelease == 'false'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download linux/amd64 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: package-linux-amd64
          path: packages-amd64
          merge-multiple: true

      - name: Download linux/arm64 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: package-linux-arm64
          path: packages-arm64
          merge-multiple: true

      - name: Prepare runtime environment (multi-platform)
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          # Extract linux/amd64 binary → runtime/bin/mindx-amd64
          mkdir -p runtime/bin
          tar xzf "packages-amd64/mindx-${VERSION_NUM}-linux-amd64.tar.gz" -C runtime/bin/
          mv runtime/bin/mindx runtime/bin/mindx-amd64
          chmod +x runtime/bin/mindx-amd64

          # Extract linux/arm64 binary → runtime/bin/mindx-arm64
          tar xzf "packages-arm64/mindx-${VERSION_NUM}-linux-arm64.tar.gz" -C runtime/bin/
          mv runtime/bin/mindx runtime/bin/mindx-arm64
          chmod +x runtime/bin/mindx-arm64

          echo "Binaries ready:"
          ls -lh runtime/bin/
          runtime/bin/mindx-amd64 version || true
          runtime/bin/mindx-arm64 version || true

          # Ensure model file is present (LFS checkout should have pulled it)
          if [ ! -f "runtime/data/models/model_q4.onnx" ]; then
            echo "WARNING: model_q4.onnx not found, fetching via LFS..."
            git lfs pull --include="*.onnx" || true
          fi
          echo "Model file:"
          ls -lh runtime/data/models/model_q4.onnx 2>/dev/null || echo "  NOT FOUND"

          # Verify runtime structure
          echo "Runtime layout:"
          find runtime/ -maxdepth 3 -type f | head -20

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub (public)
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mindx
            ghcr.io/${{ env.GITHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ==========================================================================
  # Homebrew — generate formula from Release assets & push to tap
  # ==========================================================================
  homebrew:
    name: Homebrew Formula
    runs-on: ubuntu-latest
    needs: [prepare, build, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    permissions:
      contents: write
    steps:
      - name: Checkout source (for formula template)
        uses: actions/checkout@v4

      - name: Download darwin build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-darwin-*
          path: dist
          merge-multiple: true

      - name: Calculate SHA256
        id: sha256
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          SHA256_AMD64=$(shasum -a 256 "dist/mindx-${VERSION_NUM}-darwin-amd64.tar.gz" | cut -d' ' -f1)
          SHA256_ARM64=$(shasum -a 256 "dist/mindx-${VERSION_NUM}-darwin-arm64.tar.gz" | cut -d' ' -f1)

          echo "sha256_amd64=${SHA256_AMD64}" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=${SHA256_ARM64}" >> "$GITHUB_OUTPUT"

          echo "  darwin/amd64: ${SHA256_AMD64}"
          echo "  darwin/arm64: ${SHA256_ARM64}"

      - name: Generate Homebrew formula
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          TAG=${{ needs.prepare.outputs.version }}
          SHA_AMD64="${{ steps.sha256.outputs.sha256_amd64 }}"
          SHA_ARM64="${{ steps.sha256.outputs.sha256_arm64 }}"

          sed \
            -e "s|__GITHUB_REPO__|${{ env.GITHUB_REPO }}|g" \
            -e "s|__VERSION__|${VERSION_NUM}|g" \
            -e "s|__TAG__|${TAG}|g" \
            -e "s|__SHA256_AMD64__|${SHA_AMD64}|g" \
            -e "s|__SHA256_ARM64__|${SHA_ARM64}|g" \
            scripts/homebrew-formula.rb.tpl > dist/mindx.rb

          echo "--- Generated formula ---"
          cat dist/mindx.rb

      - name: Push to Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAP_REPO="${{ env.HOMEBREW_TAP }}"
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          TAP_DIR="/tmp/homebrew-tap"

          echo "Pushing formula to ${TAP_REPO}..."

          # Clone tap (use token for auth on private repos too)
          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" \
            "${TAP_DIR}" 2>/dev/null || {
            echo "Tap repo not found or empty. Creating..."
            mkdir -p "${TAP_DIR}"
            cd "${TAP_DIR}"
            git init
            echo "# ${TAP_REPO}" > README.md
            mkdir -p Formula
            git add README.md Formula
            git commit -m "Initial commit"
            git branch -M main
            gh repo create "${TAP_REPO}" \
              --public \
              --description "Homebrew tap for MindX" \
              --source "${{ env.GITHUB_REPO }}" \
              --push 2>/dev/null || true
            # Re-clone after creation
            git clone \
              "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" \
              "${TAP_DIR}"
          }

          # Copy formula
          mkdir -p "${TAP_DIR}/Formula"
          cp dist/mindx.rb "${TAP_DIR}/Formula/mindx.rb"

          cd "${TAP_DIR}"
          git add Formula/mindx.rb

          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping push"
          else
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git commit -m "mindx ${VERSION_NUM}"
            git push origin HEAD:main || {
              # Fallback: try master branch
              git push origin HEAD:master 2>/dev/null || {
                echo "WARNING: Could not push to tap repo."
                echo "Formula saved locally at:"
                cat Formula/mindx.rb
              }
            }
            echo "Done! https://github.com/${TAP_REPO}"
          fi

      - name: Summary
        run: |
          echo "## Homebrew Formula Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version_num }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tap | \`${{ env.HOMEBREW_TAP }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Install | \`brew install ${{ env.HOMEBREW_TAP }}/mindx\` |" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Linux Packages — AppImage + .deb (all releases including prerelease)
  # ==========================================================================
  linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    needs: [prepare, build, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-linux-*
          path: packages
          merge-multiple: true

      - name: Extract Linux binaries from archives
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          cd packages
          for f in *.tar.gz; do
            echo "Extracting $f..."
            tar xzf "$f"
          done
          ls -la
          cd ..

      - name: Install packaging tools
        run: |
          # nfpm for .deb/.rpm - download binary from GitHub (install.goreleaser.com is deprecated)
          NFPM_URL=$(curl -sL "https://api.github.com/repos/goreleaser/nfpm/releases/latest" | python3 -c "import sys,json;d=json.load(sys.stdin);print([a['browser_download_url'] for a in d['assets'] if 'Linux_x86_64.tar.gz' in a['name'] and 'sbom' not in a['name']][0])")
          curl -sL "$NFPM_URL" -o /tmp/nfpm.tar.gz
          tar xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          chmod +x /usr/local/bin/nfpm
          # dpkg-deb tools + file
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot dpkg-dev file

      - name: Build AppImage
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          # Create AppDir structure
          mkdir -p dist/AppDir/usr/bin
          mkdir -p dist/AppDir/usr/share/applications
          mkdir -p dist/AppDir/usr/share/icons/hicolor/scalable/apps

          # Copy binary (amd64)
          cp packages/mindx dist/AppDir/usr/bin/mindx
          chmod +x dist/AppDir/usr/bin/mindx

          # Write AppRun launcher
          echo '#!/bin/bash' > dist/AppDir/AppRun
          echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> dist/AppDir/AppRun
          echo 'export PATH="${HERE}/usr/bin:${PATH}"' >> dist/AppDir/AppRun
          echo 'exec "${HERE}/usr/bin/mindx" "$@"' >> dist/AppDir/AppRun
          chmod +x dist/AppDir/AppRun

          # Copy desktop entry & icon
          cp scripts/com.dotnetage.mindx.desktop dist/AppDir/usr/share/applications/
          cp scripts/com.dotnetage.mindx.svg dist/AppDir/usr/share/icons/hicolor/scalable/apps/ 2>/dev/null || true

          # Download linuxdeploy (use correct repo + extract to avoid FUSE requirement)
          curl -sL \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -o linuxdeploy.AppImage
          chmod +x linuxdeploy.AppImage
          ./linuxdeploy.AppImage --appimage-extract 2>/dev/null || true
          if [ -d squashfs-root ]; then
            mv squashfs-root linuxdeploy-root
            LINUXDEPLOY="./linuxdeploy-root/AppRun"
          else
            echo "WARNING: linuxdeploy extraction failed, continuing with .deb only"
            LINUXDEPLOY=""
          fi

          # Build AppImage
          if [ -n "$LINUXDEPLOY" ]; then
            export VERSION="${VERSION_NUM}"
            $LINUXDEPLOY \
              --appdir dist/AppDir \
              --output appimage \
              --desktop-file dist/AppDir/usr/share/applications/com.dotnetage.mindx.desktop \
              --icon-file scripts/com.dotnetage.mindx.svg \
              2>&1 || {
              echo "WARNING: linuxdeploy failed, creating minimal AppImage..."
              echo '#!/bin/sh' > dist/AppDir/AppRun
              echo 'exec "$(dirname "$(readlink -f "$0")")/usr/bin/mindx" "$@"' >> dist/AppDir/AppRun
              chmod +x dist/AppDir/AppRun
              $LINUXDEPLOY --appdir dist/AppDir --output appimage 2>/dev/null || true
            }
          fi

          # Rename output
          if [ -f "Mindx-${VERSION_NUM}-x86_64.AppImage" ]; then
            mv "Mindx-${VERSION_NUM}-x86_64.AppImage" "dist/Mindx-${VERSION_NUM}.AppImage"
          elif ls Mindx-*.AppImage 2>/dev/null; then
            mv Mindx-*.AppImage dist/ 2>/dev/null || true
          fi

          ls -lh dist/*.AppImage 2>/dev/null || echo "No AppImage generated"

      - name: Build .deb packages
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          for ARCH in amd64 arm64; do
            echo "--- Building .deb for ${ARCH} ---"

            # Use the correct binary name (always mindx in artifacts)
            cp packages/mindx "dist/mindx_${ARCH}"
            chmod +x "dist/mindx_${ARCH}"

            # Generate nfpm config for this arch
            {
              echo "name: mindx"
              echo "arch: \"${ARCH}\""
              echo "version: \"${VERSION_NUM}\""
              echo "section: utils"
              echo "priority: optional"
              echo "maintainer: \"DotNetAge <ray@dotnetage.com>\""
              echo "description: |"
              echo "  MindX - AI-native multi-agent conversation platform with OPC capabilities."
              echo "  A powerful CLI tool for managing AI agents, providers, and conversations."
              echo "homepage: \"https://github.com/${GITHUB_REPO}\""
              echo "license: MIT"
              echo "vendor: DotNetAge"
              echo ""
              echo "contents:"
              echo "  - src: dist/mindx_${ARCH}"
              echo "    dst: /usr/local/bin/mindx"
              echo "    file_info:"
              echo "      mode: 0755"
              echo "  - src: scripts/mindx-daemon.service"
              echo "    dst: /lib/systemd/system/mindx-daemon.service"
              echo "    file_info:"
              echo "      mode: 0644"
              echo ""
              echo "scripts:"
              echo "  postinstall: scripts/postinstall.sh"
              echo "  preremove: scripts/preremove.sh"
            } > "dist/nfpm-${ARCH}.yaml"

            nfpm pkg --config "dist/nfpm-${ARCH}.yaml" --target dist/ --packager deb
            nfpm pkg --config "dist/nfpm-${ARCH}.yaml" --target dist/ --packager rpm

            # Clean up temp file
            rm -f "dist/mindx_${ARCH}"
          done

          ls -lh dist/*.deb 2>/dev/null || echo "No .deb packages generated"

      - name: Upload Linux packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.prepare.outputs.version }}
          FILES=""

          for f in dist/*.AppImage dist/*.deb dist/*.rpm; do
            if [ -f "$f" ]; then
              FILES="$FILES $f"
            fi
          done

          if [ -n "$FILES" ]; then
            echo "Uploading to release ${TAG}:"
            ls -lh $FILES
            gh release upload "${TAG}" $FILES --repo "${{ env.GITHUB_REPO }}" --clobber
          else
            echo "No Linux packages to upload"
          fi

      - name: Summary
        run: |
          echo "## Linux Packages Built & Uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Arch |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/*.AppImage; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | Universal |" >> "$GITHUB_STEP_SUMMARY"
          done
          for f in dist/*.deb; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | Debian/Ubuntu |" >> "$GITHUB_STEP_SUMMARY"
          done
          for f in dist/*.rpm; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | Fedora/RHEL |" >> "$GITHUB_STEP_SUMMARY"
          done

  # ==========================================================================
  # APT + YUM Repository — build repo & deploy to GitHub Pages
  #
  # Requires Secret: APT_GPG_PRIVATE_KEY — GPG private key for signing the repo.
  #   Setup: cat ~/mindx-gpg-private.key | pbcopy
  #   Then add as repo secret: Settings → Secrets and variables → Actions → New repository secret
  #   Name: APT_GPG_PRIVATE_KEY
  #
  # First-time: Enable GitHub Pages in repo Settings → Pages → Source: Deploy from branch → gh-pages
  # ==========================================================================
  apt-repo:
    name: APT/YUM Repo (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [prepare, linux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux packages from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.prepare.outputs.version }}
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          mkdir -p packages

          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "*.deb" \
            --dir packages/

          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "*.rpm" \
            --dir packages/ || echo "No RPM packages found"

          echo "=== Downloaded packages ==="
          ls -lh packages/

      - name: Install repo tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev apt-utils createrepo-c

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "⚠  APT_GPG_PRIVATE_KEY not set — repo will NOT be signed."
            echo "   Generate a key locally and add it as a repo secret."
            echo "   Without signing, 'apt update' will warn about untrusted repo."
            echo "   For now, creating unsigned repo (add [trusted=yes] to sources.list)."
            exit 0
          fi
          echo "${GPG_PRIVATE_KEY}" | gpg --import
          echo "GPG key imported successfully"

      - name: Build APT repository
        run: |
          set -x
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          mkdir -p repo/apt
          cd repo/apt

          # Create per-architecture pool directories (prevents dpkg-scanpackages
          # from warning about duplicate packages and dropping one arch)
          for arch in amd64 arm64; do
            mkdir -p "pool/main/m/mindx-${arch}"
            mkdir -p "dists/stable/main/binary-${arch}"
          done

          # Copy .deb packages into arch-specific pool dirs
          for deb in ../../packages/*.deb; do
            case "$deb" in
              *_amd64.deb) cp "$deb" pool/main/m/mindx-amd64/ ;;
              *_arm64.deb) cp "$deb" pool/main/m/mindx-arm64/ ;;
              *)           cp "$deb" pool/main/m/mindx-amd64/ ;; # fallback
            esac
          done

          # Generate per-architecture Packages indices
          for arch in amd64 arm64; do
            if [ "$(ls -A pool/main/m/mindx-${arch}/*.deb 2>/dev/null)" ]; then
              dpkg-scanpackages "pool/main/m/mindx-${arch}" /dev/null \
                | gzip -9c > "dists/stable/main/binary-${arch}/Packages.gz"
            fi
          done

          # Generate Release + GPG signature
          cd dists/stable
          apt-ftparchive release . > Release

          # Use --list-secret-keys to only sign when a secret key is available
          if gpg --list-secret-keys >/dev/null 2>&1; then
            gpg --clearsign -o InRelease Release
            gpg -abs -o Release.gpg Release
            echo "APT repo signed with GPG"
          else
            echo "APT repo unsigned — add [trusted=yes] to client sources.list"
          fi

          cd ../../../..

      - name: Build YUM repository
        run: |
          mkdir -p repo/rpm/Packages

          # Copy .rpm packages
          cp packages/*.rpm repo/rpm/Packages/ 2>/dev/null || echo "No .rpm files"

          # Generate YUM metadata
          if ls repo/rpm/Packages/*.rpm >/dev/null 2>&1; then
            createrepo_c --update repo/rpm/ 2>&1 || createrepo --update repo/rpm/ 2>&1 || true
            echo "YUM repo metadata generated"
          else
            echo "No RPM packages to index"
          fi

      - name: Copy install scripts
        run: |
          cp scripts/apt-repo/install.sh repo/
          cp scripts/apt-repo/KEY.gpg repo/KEY.gpg
          echo "MindX APT/YUM Repository" > repo/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          keep_files: false

      - name: Summary
        run: |
          echo "## APT/YUM Repository Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | https://dotnetage.github.io/mindx/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| APT install | \`curl -fsSL https://dotnetage.github.io/mindx/install.sh | sudo bash\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| YUM install | \`curl -fsSL https://dotnetage.github.io/mindx/install.sh | sudo bash\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Packages" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ls -lh packages/ >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

  # ==========================================================================
  # Snap — build and push to Snap Store (stable only)
  # Generates snapcraft.yaml first, then builds.
  #
  # Requires: SNAP_STORE_TOKEN secret
  #   How to get the token:
  #     1. On Linux (or via Docker/VM): snapcraft login
  #     2. Export credentials:
  #        snapcraft export-login --snaps mindx --channels stable credentials.txt
  #     3. cat credentials.txt → copy contents → paste as GitHub Secret
  #   Reference: https://documentation.ubuntu.com/snapcraft/stable/how-to/publishing/authenticate/
  # ==========================================================================
  snap:
    name: Snap (Linux)
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.is_prerelease == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snapcraft.yaml from template
        run: |
          sed -e "s|__VERSION__|${{ needs.prepare.outputs.version_num }}|g" \
            snap/snapcraft.yaml.tpl > snap/snapcraft.yaml
          cat snap/snapcraft.yaml

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build-snap
        with:
          path: .

      - name: Publish Snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}
        run: snapcraft upload mindx_*.snap --release stable

      - name: Summary
        run: |
          echo "## Snap Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Package: \`${{ steps.build-snap.outputs.snap }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "sudo snap install mindx" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Flatpak — submit PR to Flathub (stable only)
  #
  # NOTE: First-time setup required:
  #   1. Fork https://github.com/flathub/com.dotnetage.mindx
  #      (or create it via Flathub submission process)
  #   2. Add FLATPUBBot_TOKEN secret (GitHub PAT with repo access)
  # ==========================================================================
  flatpak:
    name: Flatpak (Linux)
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux amd64 asset & get SHA256
        id: sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          TAG=${{ needs.prepare.outputs.version }}
          mkdir -p dist

          gh release download "${TAG}" \
            --pattern "mindx-*linux-amd64.tar.gz" \
            --dir dist \
            --repo "${{ env.GITHUB_REPO }}"

          SHA=$(shasum -a 256 "dist/mindx-${VERSION_NUM}-linux-amd64.tar.gz" | cut -d' ' -f1)
          URL="https://github.com/${{ env.GITHUB_REPO }}/releases/download/${TAG}/mindx-${VERSION_NUM}-linux-amd64.tar.gz"

          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "release_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Generate Flatpak manifest
        run: |
          sed \
            -e "s|__RELEASE_URL__|${{ steps.sha256.outputs.release_url }}|g" \
            -e "s|__SHA256_AMD64__|${{ steps.sha256.outputs.sha256 }}|g" \
            scripts/flatpak-manifest.yml.tpl > com.dotnetage.mindx.flatpak-ref.yml

          cat com.dotnetage.mindx.flatpak-ref.yml

      - name: Submit to Flathub
        continue-on-error: true
        run: |
          echo "Flatpak submission requires manual setup:"
          echo "  1. Fork https://github.com/flathub/com.dotnetage.mindx"
          echo "  2. Add FLATPUBBot_TOKEN secret"
          echo "Skipping automated submission for now."

      - name: Summary
        run: |
          echo "## Flatpak" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PR submitted to Flathub (\`com.dotnetage.mindx\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "flatpak install flathub com.dotnetage.mindx" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
