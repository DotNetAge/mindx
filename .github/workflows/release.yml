# =============================================================================
# MindX Release Pipeline — Automated GitHub Releases + All Package Managers
# =============================================================================
# Trigger: push of version tags (v*)
#
# Pipeline:
#   prepare → build(5 platforms) → release(GH Release)
#     ├── docker         → GHCR + Docker Hub (stable only)
#     ├── homebrew      → DotNetAge/homebrew-mindx tap
#     ├── winget        → microsoft/winget-pkgs PR
#     ├── linux-packages→ AppImage + .deb (attached to GH Release)
#     ├── snap          → Snap Store (stable only)
#     └── flatpak       → Flathub PR (stable only)
#
# Usage:
#   git tag v2.2.0 && git push origin v2.2.0
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.26'
  BINARY_NAME: mindx
  GITHUB_REPO: ${{ github.repository }}
  HOMEBREW_TAP: 'DotNetAge/homebrew-mindx'

jobs:
  # ==========================================================================
  # Prepare — extract version from tag, generate release notes
  # ==========================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
      notes: ${{ steps.notes.outputs.content }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_num=${TAG#v}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing: $TAG (prerelease=$( [[ "$TAG" == *-* ]] && echo yes || echo no ))"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          CONTENT="## MindX ${{ steps.version.outputs.version }}\n\n"

          if [ -n "$PREV_TAG" ]; then
            CONTENT="${CONTENT}### Changes since ${PREV_TAG}\n\n"
            CONTENT+="\`\`\`\n"
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" --no-merges >> /tmp/notes.txt 2>/dev/null || true
            if [ -s /tmp/notes.txt ]; then
              CONTENT+="$(cat /tmp/notes.txt)"
            else
              CONTENT+="- Initial release or no commits since last tag"
            fi
            CONTENT+="\n\`\`\`\n"
          else
            CONTENT+="- Initial release\n"
          fi

          CONTENT+="\n---\n\n"
          CONTENT+="| Platform | Architecture | File |\n"
          CONTENT+="|----------|-------------|------|\n"
          CONTENT+="| Linux | amd64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-linux-amd64.tar.gz\` |\n"
          CONTENT+="| Linux | arm64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-linux-arm64.tar.gz\` |\n"
          CONTENT+="| macOS (Intel) | amd64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-darwin-amd64.tar.gz\` |\n"
          CONTENT+="| macOS (Apple Silicon) | arm64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-darwin-arm64.tar.gz\` |\n"
          CONTENT+="| Windows | amd64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}-windows-amd64.zip\` |\n"
          CONTENT+="| Windows (Installer) | amd64 | \`${{ env.BINARY_NAME }}-${{ steps.version.outputs.version_num }}.msi\` |\n"

          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  # ==========================================================================
  # Build — cross-compile all platforms in parallel
  # ==========================================================================
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ''
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ''
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install musl cross-compiler
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          # For arm64: install zig as cross-compiler fallback (musl.cc often unreachable from CI)
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            if ! command -v aarch64-linux-musl-gcc &>/dev/null; then
              echo "aarch64-linux-musl-gcc not found, installing zig..."
              ZIG_VER="0.13.0"
              wget -q "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz" -O /tmp/zig.tar.xz
              sudo tar xf /tmp/zig.tar.xz -C /usr/local
              sudo ln -sf /usr/local/zig-linux-x86_64-${ZIG_VER}/zig /usr/local/bin/zig
              rm /tmp/zig.tar.xz
              zig version
            fi
          fi

      - name: Setup MinGW + zip (Windows CGO)
        if: matrix.goos == 'windows'
        run: choco install mingw zip -y --no-progress

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          # Set musl cross-compiler for Linux (Alpine Docker image uses musl)
          if [ "$GOOS" = "linux" ]; then
            if [ "$GOARCH" = "amd64" ]; then
              export CC=x86_64-linux-musl-gcc
            elif [ "$GOARCH" = "arm64" ]; then
              # Use native musl-gcc if available, otherwise fall back to zig
              if command -v aarch64-linux-musl-gcc &>/dev/null; then
                export CC=aarch64-linux-musl-gcc
              else
                export CC="zig cc -target aarch64-linux-musl"
              fi
            fi
          fi
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          mkdir -p dist

          go build \
            -trimpath \
            -ldflags="-s -w \
              -X github.com/DotNetAge/mindx/internal/core.Version=${VERSION_NUM} \
              -X github.com/DotNetAge/mindx/internal/core.Commit=${COMMIT} \
              -X github.com/DotNetAge/mindx/internal/core.BuildTime=${BUILD_TIME}" \
            -o dist/${{ env.BINARY_NAME }}${{ matrix.ext }} \
            .

          ls -lh dist/

      - name: Package (tar.gz / zip)
        shell: bash
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          cd dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "../${{ env.BINARY_NAME }}-${VERSION_NUM}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "${{ env.BINARY_NAME }}${{ matrix.ext }}"
          else
            tar czf "../${{ env.BINARY_NAME }}-${VERSION_NUM}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "${{ env.BINARY_NAME }}"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 1

  # ==========================================================================
  # MSI — build Windows installer (WiX) for proper install/uninstall
  #
  # Produces: mindx-VERSION.msi with:
  #   - Custom UI: Provider selection, API Key input, options
  #   - Daemon as Windows Service (NSSM wrapper, auto-start)
  #   - Runtime files to %LOCALAPPDATA%\Mindx\
  #   - Python venv auto-setup
  #   - Browser shortcut -> http://localhost:1313
  # ==========================================================================
  msi:
    name: MSI Installer (Windows)
    runs-on: windows-latest
    needs: [prepare, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          pattern: package-windows-amd64
          path: packages
          merge-multiple: true

      - name: Extract mindx.exe from zip
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version_num }}"
          Expand-Archive -Path "packages\mindx-${version}-windows-amd64.zip" -DestinationPath staging -Force
          Copy-Item "staging\mindx.exe" ".\mindx.exe"
          Write-Host "mindx.exe ready:"
          Get-Item mindx.exe | Select-Object Name, Length

      - name: Verify runtime files for packaging
        shell: pwsh
        run: |
          # runtime/ is already present from checkout — just verify structure
          # The wxs and heat.exe reference: runtime/settings/*.yml, runtime/skills/*, runtime/agents/*
          $required = @("settings", "skills", "agents")
          foreach ($dir in $required) {
            $path = Join-Path "runtime" $dir
            if (-not (Test-Path $path)) {
              Write-Warning "Missing runtime subdirectory: $path"
            }
          }
          Write-Host "Runtime layout:"
          Get-ChildItem -Path runtime | Format-Table Name, Mode -AutoSize

      - name: Install WiX Toolset v3
        run: choco install wixtoolset --no-progress -y

      - name: Install ImageMagick (for icon conversion)
        run: choco install imagemagick --no-progress -y

      - name: Install NSSM (Non-Sucking Service Manager)
        run: choco install nssm --no-progress -y
        shell: cmd

      - name: Copy nssm.exe to build root
        shell: pwsh
        run: |
          $nssmPath = "${env:ProgramData}\chocolatey\bin\nssm.exe"
          if (-not (Test-Path $nssmPath)) {
            # choco 64-bit install path
            $nssmPath = "${env:ProgramData}\chocolatey\lib\nssm\tools\nssm-2.24\win64\nssm.exe"
          }
          if (-not (Test-Path $nssmPath)) {
            # Find any nssm.exe
            $nssmPath = Get-ChildItem -Path "${env:ProgramData}\chocolatey" -Recurse -Filter "nssm.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $nssmPath -or -not (Test-Path $nssmPath)) {
            Write-Error "nssm.exe not found after choco install"
          }
          Copy-Item $nssmPath ".\nssm.exe" -Force
          Write-Host "NSSM ready:"
          Get-Item nssm.exe | Select-Object Name, Length

      - name: Convert icon (PNG -> ICO)
        shell: pwsh
        run: |
          if (Test-Path "assets/images/mindx.png") {
            # Use ImageMagick to convert PNG to multi-resolution ICO
            magick "assets/images/mindx.png" `
              -define icon:auto-resize=256,128,64,48,32,16 `
              "mindx.ico"
            Write-Host "Icon created from PNG: mindx.ico"
            Get-Item mindx.ico | Select-Object Name, Length
          } else {
            # Fallback: generate a minimal valid 1-pixel ICO file so WiX doesn't fail
            # ICO format: 6-byte header + 16-byte image directory entry + pixel data
            $icoBytes = [byte[]]::new(86)
            # ICONDIR header: reserved=0, type=1 (ICO), count=1
            $icoBytes[0] = 0x00; $icoBytes[1] = 0x00  # reserved
            $icoBytes[2] = 0x01; $icoBytes[3] = 0x00  # type = ICO
            $icoBytes[4] = 0x01; $icoBytes[5] = 0x00  # count = 1
            # ICONDIRENTRY: size=16, offset=22
            $icoBytes[6]  = 0x20  # width = 32
            $icoBytes[7]  = 0x20  # height = 32
            $icoBytes[8]  = 0x00  # color palette
            $icoBytes[9]  = 0x00  # reserved
            $icoBytes[10] = 0x01  # color planes
            $icoBytes[11] = 0x18  # bits per pixel
            $icoBytes[12] = 0x40; $icoBytes[13] = 0x00; $icoBytes[14] = 0x00; $icoBytes[15] = 0x00  # size = 64 bytes
            $icoBytes[16] = 0x16; $icoBytes[17] = 0x00; $icoBytes[18] = 0x00; $icoBytes[19] = 0x00  # offset = 22
            # BITMAPINFOHEADER (40 bytes starting at offset 22)
            $offset = 22
            $icoBytes[$offset+0] = 0x28; $icoBytes[$offset+1] = 0x00; $icoBytes[$offset+2] = 0x00; $icoBytes[$offset+3] = 0x00  # header size = 40
            $icoBytes[$offset+4] = 0x20; $icoBytes[$offset+5] = 0x00; $icoBytes[$offset+6] = 0x00; $icoBytes[$offset+7] = 0x00  # width = 32
            $icoBytes[$offset+8] = 0x40; $icoBytes[$offset+9] = 0x00; $icoBytes[$offset+10] = 0x00; $icoBytes[$offset+11] = 0x00  # height = 64 (doubled for XOR+AND masks)
            $icoBytes[$offset+12] = 0x01; $icoBytes[$offset+13] = 0x00  # planes = 1
            $icoBytes[$offset+14] = 0x20; $icoBytes[$offset+15] = 0x00  # bpp = 32
            $icoBytes[$offset+16] = 0x00; $icoBytes[$offset+17] = 0x00; $icoBytes[$offset+18] = 0x00; $icoBytes[$offset+19] = 0x00  # compression = none
            $icoBytes[$offset+20] = 0x00; $icoBytes[$offset+21] = 0x00; $icoBytes[$offset+22] = 0x00; $icoBytes[$offset+23] = 0x00  # image size
            $icoBytes[$offset+24] = 0x00; $icoBytes[$offset+25] = 0x00; $icoBytes[$offset+26] = 0x00; $icoBytes[$offset+27] = 0x00  # x/m per meter
            $icoBytes[$offset+28] = 0x00; $icoBytes[$offset+29] = 0x00; $icoBytes[$offset+30] = 0x00; $icoBytes[$offset+31] = 0x00  # colors used
            $icoBytes[$offset+32] = 0x00; $icoBytes[$offset+33] = 0x00; $icoBytes[$offset+34] = 0x00; $icoBytes[$offset+35] = 0x00  # colors important
            # Pixel data: 1 transparent pixel (BGRA) + empty AND mask row
            # XOR bitmap: 1 pixel = 4 bytes BGRA, padded to 4-byte boundary per row (32 pixels * 4 bpp / 8 = 128 bytes/row)
            # For simplicity: write minimal pixel data (the icon will appear as a tiny dot)
            [System.IO.File]::WriteAllBytes("mindx.ico", $icoBytes)
            Write-Host "Generated minimal placeholder ICO (assets/images/mindx.png not found)"
            Get-Item mindx.ico | Select-Object Name, Length
          }

      - name: Prepare wxs with version
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version_num }}"
          # Replace __VERSION__ placeholder in wxs
          (Get-Content "scripts/installer.wxs" -Encoding UTF8) -replace '__VERSION__', $version | Set-Content "scripts/installer.wxs" -Encoding UTF8
          Write-Host "WXS version set to: $version"

      - name: Build MSI (candle + light)
        shell: pwsh
        run: |
          $env:WIX = "${env:ProgramFiles(x86)}\WiX Toolset v3.11"
          $env:Path += ";$env:WIX\bin"

          $version = "${{ needs.prepare.outputs.version_num }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          # Step 0: Use heat.exe to generate .wxs fragments for large directory trees
          #   - heat-skills.wxs: all files under runtime/skills/ -> ComponentGroup "SkillFiles"
          #   - heat-agents.wxs: all files under runtime/agents/ -> ComponentGroup "AgentFiles"
          #   Both target MINDX_SKILLS_DIR / MINDX_AGENTS_DIR respectively
          Write-Host "=== Generating heat fragments for runtime/skills ==="
          heat.exe dir ".\runtime\skills" `
            -out "heat-skills.wxs" `
            -cg SkillFiles `
            -dr MINDX_SKILLS_DIR `
            -scom -sreg -srd -sfrag `
            -var "var.SourceDir" `
            -ag

          if (-not (Test-Path "heat-skills.wxs")) {
            Write-Error "heat.exe failed to generate heat-skills.wxs for skills directory"
          }
          Write-Host "heat-skills.wxs generated ($(Get-Item heat-skills.wxs).Length) bytes"

          Write-Host "=== Generating heat fragments for runtime/agents ==="
          heat.exe dir ".\runtime\agents" `
            -out "heat-agents.wxs" `
            -cg AgentFiles `
            -dr MINDX_AGENTS_DIR `
            -scom -sreg -srd -sfrag `
            -var "var.SourceDir" `
            -ag

          if (-not (Test-Path "heat-agents.wxs")) {
            Write-Error "heat.exe failed to generate heat-agents.wxs for agents directory"
          }
          Write-Host "heat-agents.wxs generated ($(Get-Item heat-agents.wxs).Length) bytes"

          # Step 1: Compile .wxs -> .wixobj (main wxs + 2 heat-generated fragments)
          Write-Host "=== Compiling WiX sources with candle ==="
          candle scripts/installer.wxs heat-skills.wxs heat-agents.wxs `
            -ext WixUIExtension `
            -dSourceDir="."

          # Step 2: Link .wixobj -> .msi
          Write-Host "=== Linking with light ==="
          light installer.wixobj heat-skills.wixobj heat-agents.wixobj `
            -ext WixUIExtension `
            -out "dist/mindx-${version}.msi"

          if (Test-Path "dist/mindx-${version}.msi") {
            $msi = Get-Item "dist/mindx-${version}.msi"
            Write-Host "MSI built successfully:"
            Write-Host "  File: $($msi.Name)"
            Write-Host "  Size: $([math]::Round($msi.Length / 1MB, 1)) MB"
          } else {
            Write-Error "MSI build failed — output not found"
          }

      - name: Upload MSI to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.version }}"
          $version = "${{ needs.prepare.outputs.version_num }}"
          $msiFile = "dist/mindx-${version}.msi"

          if (Test-Path $msiFile) {
            gh release upload "$tag" $msiFile `
              --repo "${{ env.GITHUB_REPO }}" --clobber
            Write-Host "Uploaded: $msiFile"
          } else {
            Write-Host "MSI file not found, skipping upload"
          }

      - name: Summary
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version_num }}"
          echo "## MSI Installer Built & Uploaded" >> "$env:GITHUB_STEP_SUMMARY"
          echo "" >> "$env:GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$env:GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$env:GITHUB_STEP_SUMMARY"
          echo "| File | \`mindx-${version}.msi\` |" >> "$env:GITHUB_STEP_SUMMARY"
          echo "| Platform | Windows x86_64 |" >> "$env:GITHUB_STEP_SUMMARY"
          echo "| Features | Provider setup, API Key env var, NSSM service, AppData runtime, Python venv, browser shortcut |" >> "$env:GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Release — create GitHub Release with all assets + checksums
  # ==========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build, msi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: packages
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd packages
          shasum -a 256 *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: MindX ${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.notes }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            packages/*.tar.gz
            packages/*.zip
            packages/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Docker — build & push to Docker Hub (public) + GHCR (stable only)
  #
  # Requires Secrets:
  #   DOCKERHUB_USERNAME  — Your Docker Hub username
  #   DOCKERHUB_TOKEN     — Access Token (not password!)
  #                         Get: https://hub.docker.com/settings/security
  #                         → New Access Token → Read & Write → Generate
  # ==========================================================================
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.is_prerelease == 'false'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download linux/amd64 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: package-linux-amd64
          path: packages-amd64
          merge-multiple: true

      - name: Download linux/arm64 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: package-linux-arm64
          path: packages-arm64
          merge-multiple: true

      - name: Prepare runtime environment (multi-platform)
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          # Extract linux/amd64 binary → runtime/bin/mindx-amd64
          mkdir -p runtime/bin
          tar xzf "packages-amd64/mindx-${VERSION_NUM}-linux-amd64.tar.gz" -C runtime/bin/
          mv runtime/bin/mindx runtime/bin/mindx-amd64
          chmod +x runtime/bin/mindx-amd64

          # Extract linux/arm64 binary → runtime/bin/mindx-arm64
          tar xzf "packages-arm64/mindx-${VERSION_NUM}-linux-arm64.tar.gz" -C runtime/bin/
          mv runtime/bin/mindx runtime/bin/mindx-arm64
          chmod +x runtime/bin/mindx-arm64

          echo "Binaries ready:"
          ls -lh runtime/bin/
          runtime/bin/mindx-amd64 version || true
          runtime/bin/mindx-arm64 version || true

          # Ensure model file is present (LFS checkout should have pulled it)
          if [ ! -f "runtime/data/models/model_q4.onnx" ]; then
            echo "WARNING: model_q4.onnx not found, fetching via LFS..."
            git lfs pull --include="*.onnx" || true
          fi
          echo "Model file:"
          ls -lh runtime/data/models/model_q4.onnx 2>/dev/null || echo "  NOT FOUND"

          # Verify runtime structure
          echo "Runtime layout:"
          find runtime/ -maxdepth 3 -type f | head -20

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub (public)
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mindx
            ghcr.io/${{ env.GITHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ==========================================================================
  # Homebrew — generate formula from Release assets & push to tap
  # ==========================================================================
  homebrew:
    name: Homebrew Formula
    runs-on: ubuntu-latest
    needs: [prepare, build, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    permissions:
      contents: write
    steps:
      - name: Checkout source (for formula template)
        uses: actions/checkout@v4

      - name: Download darwin build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-darwin-*
          path: dist
          merge-multiple: true

      - name: Calculate SHA256
        id: sha256
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          SHA256_AMD64=$(shasum -a 256 "dist/mindx-${VERSION_NUM}-darwin-amd64.tar.gz" | cut -d' ' -f1)
          SHA256_ARM64=$(shasum -a 256 "dist/mindx-${VERSION_NUM}-darwin-arm64.tar.gz" | cut -d' ' -f1)

          echo "sha256_amd64=${SHA256_AMD64}" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=${SHA256_ARM64}" >> "$GITHUB_OUTPUT"

          echo "  darwin/amd64: ${SHA256_AMD64}"
          echo "  darwin/arm64: ${SHA256_ARM64}"

      - name: Generate Homebrew formula
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          TAG=${{ needs.prepare.outputs.version }}
          SHA_AMD64="${{ steps.sha256.outputs.sha256_amd64 }}"
          SHA_ARM64="${{ steps.sha256.outputs.sha256_arm64 }}"

          sed \
            -e "s|__GITHUB_REPO__|${{ env.GITHUB_REPO }}|g" \
            -e "s|__VERSION__|${VERSION_NUM}|g" \
            -e "s|__TAG__|${TAG}|g" \
            -e "s|__SHA256_AMD64__|${SHA_AMD64}|g" \
            -e "s|__SHA256_ARM64__|${SHA_ARM64}|g" \
            scripts/homebrew-formula.rb.tpl > dist/mindx.rb

          echo "--- Generated formula ---"
          cat dist/mindx.rb

      - name: Push to Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAP_REPO="${{ env.HOMEBREW_TAP }}"
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          TAP_DIR="/tmp/homebrew-tap"

          echo "Pushing formula to ${TAP_REPO}..."

          # Clone tap (use token for auth on private repos too)
          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" \
            "${TAP_DIR}" 2>/dev/null || {
            echo "Tap repo not found or empty. Creating..."
            mkdir -p "${TAP_DIR}"
            cd "${TAP_DIR}"
            git init
            echo "# ${TAP_REPO}" > README.md
            mkdir -p Formula
            git add README.md Formula
            git commit -m "Initial commit"
            git branch -M main
            gh repo create "${TAP_REPO}" \
              --public \
              --description "Homebrew tap for MindX" \
              --source "${{ env.GITHUB_REPO }}" \
              --push 2>/dev/null || true
            # Re-clone after creation
            git clone \
              "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" \
              "${TAP_DIR}"
          }

          # Copy formula
          mkdir -p "${TAP_DIR}/Formula"
          cp dist/mindx.rb "${TAP_DIR}/Formula/mindx.rb"

          cd "${TAP_DIR}"
          git add Formula/mindx.rb

          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping push"
          else
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git commit -m "mindx ${VERSION_NUM}"
            git push origin HEAD:main || {
              # Fallback: try master branch
              git push origin HEAD:master 2>/dev/null || {
                echo "WARNING: Could not push to tap repo."
                echo "Formula saved locally at:"
                cat Formula/mindx.rb
              }
            }
            echo "Done! https://github.com/${TAP_REPO}"
          fi

      - name: Summary
        run: |
          echo "## Homebrew Formula Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version_num }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tap | \`${{ env.HOMEBREW_TAP }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Install | \`brew install ${{ env.HOMEBREW_TAP }}/mindx\` |" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Winget — submit PR to microsoft/winget-pkgs (stable only)
  # Uses the official microsoft/winget-create-action which handles
  # manifest generation and PR creation automatically.
  # ==========================================================================
  winget:
    name: Winget (Windows)
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    permissions:
      contents: read
    steps:
      - name: Submit Winget package
        uses: vedantmgoyal9/winget-releaser@main
        continue-on-error: true
        with:
          identifier: DotNetAge.Mindx
          token: ${{ secrets.WINGET_TOKEN }}
          release-tag: ${{ needs.prepare.outputs.version }}
          installers-regex: windows-amd64

      - name: Summary
        run: |
          echo "## Winget Manifest Submitted" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PR submitted to \`microsoft/winget-pkgs\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "winget install DotNetAge.Mindx" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Linux Packages — AppImage + .deb (all releases including prerelease)
  # ==========================================================================
  linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    needs: [prepare, build, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-linux-*
          path: packages
          merge-multiple: true

      - name: Extract Linux binaries from archives
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          cd packages
          for f in *.tar.gz; do
            echo "Extracting $f..."
            tar xzf "$f"
          done
          ls -la
          cd ..

      - name: Install packaging tools
        run: |
          # nfpm for .deb/.rpm - download binary from GitHub (install.goreleaser.com is deprecated)
          NFPM_URL=$(curl -sL "https://api.github.com/repos/goreleaser/nfpm/releases/latest" | python3 -c "import sys,json;d=json.load(sys.stdin);print([a['browser_download_url'] for a in d['assets'] if 'Linux_x86_64.tar.gz' in a['name'] and 'sbom' not in a['name']][0])")
          curl -sL "$NFPM_URL" -o /tmp/nfpm.tar.gz
          tar xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          chmod +x /usr/local/bin/nfpm
          # dpkg-deb tools + file
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot dpkg-dev file

      - name: Build AppImage
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          # Create AppDir structure
          mkdir -p dist/AppDir/usr/bin
          mkdir -p dist/AppDir/usr/share/applications
          mkdir -p dist/AppDir/usr/share/icons/hicolor/scalable/apps

          # Copy binary (amd64)
          cp packages/mindx dist/AppDir/usr/bin/mindx
          chmod +x dist/AppDir/usr/bin/mindx

          # Write AppRun launcher
          echo '#!/bin/bash' > dist/AppDir/AppRun
          echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> dist/AppDir/AppRun
          echo 'export PATH="${HERE}/usr/bin:${PATH}"' >> dist/AppDir/AppRun
          echo 'exec "${HERE}/usr/bin/mindx" "$@"' >> dist/AppDir/AppRun
          chmod +x dist/AppDir/AppRun

          # Copy desktop entry & icon
          cp scripts/com.dotnetage.mindx.desktop dist/AppDir/usr/share/applications/
          cp scripts/com.dotnetage.mindx.svg dist/AppDir/usr/share/icons/hicolor/scalable/apps/ 2>/dev/null || true

          # Download linuxdeploy (use correct repo + extract to avoid FUSE requirement)
          curl -sL \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -o linuxdeploy.AppImage
          chmod +x linuxdeploy.AppImage
          ./linuxdeploy.AppImage --appimage-extract 2>/dev/null || true
          if [ -d squashfs-root ]; then
            mv squashfs-root linuxdeploy-root
            LINUXDEPLOY="./linuxdeploy-root/AppRun"
          else
            echo "WARNING: linuxdeploy extraction failed, continuing with .deb only"
            LINUXDEPLOY=""
          fi

          # Build AppImage
          if [ -n "$LINUXDEPLOY" ]; then
            export VERSION="${VERSION_NUM}"
            $LINUXDEPLOY \
              --appdir dist/AppDir \
              --output appimage \
              --desktop-file dist/AppDir/usr/share/applications/com.dotnetage.mindx.desktop \
              --icon-file scripts/com.dotnetage.mindx.svg \
              2>&1 || {
              echo "WARNING: linuxdeploy failed, creating minimal AppImage..."
              echo '#!/bin/sh' > dist/AppDir/AppRun
              echo 'exec "$(dirname "$(readlink -f "$0")")/usr/bin/mindx" "$@"' >> dist/AppDir/AppRun
              chmod +x dist/AppDir/AppRun
              $LINUXDEPLOY --appdir dist/AppDir --output appimage 2>/dev/null || true
            }
          fi

          # Rename output
          if [ -f "Mindx-${VERSION_NUM}-x86_64.AppImage" ]; then
            mv "Mindx-${VERSION_NUM}-x86_64.AppImage" "dist/Mindx-${VERSION_NUM}.AppImage"
          elif ls Mindx-*.AppImage 2>/dev/null; then
            mv Mindx-*.AppImage dist/ 2>/dev/null || true
          fi

          ls -lh dist/*.AppImage 2>/dev/null || echo "No AppImage generated"

      - name: Build .deb packages
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}

          for ARCH in amd64 arm64; do
            echo "--- Building .deb for ${ARCH} ---"

            # Use the correct binary name (always mindx in artifacts)
            cp packages/mindx "dist/mindx_${ARCH}"
            chmod +x "dist/mindx_${ARCH}"

            # Generate nfpm config for this arch
            {
              echo "name: mindx"
              echo "arch: \"${ARCH}\""
              echo "version: \"${VERSION_NUM}\""
              echo "section: utils"
              echo "priority: optional"
              echo "maintainer: \"DotNetAge <ray@dotnetage.com>\""
              echo "description: |"
              echo "  MindX - AI-native multi-agent conversation platform with OPC capabilities."
              echo "  A powerful CLI tool for managing AI agents, providers, and conversations."
              echo "homepage: \"https://github.com/${GITHUB_REPO}\""
              echo "license: MIT"
              echo "vendor: DotNetAge"
              echo ""
              echo "contents:"
              echo "  - src: dist/mindx_${ARCH}"
              echo "    dst: /usr/local/bin/mindx"
              echo "    file_info:"
              echo "      mode: 0755"
              echo ""
              echo "scripts:"
              echo "  postinstall: scripts/postinstall.sh"
              echo "  preremove: scripts/preremove.sh"
            } > "dist/nfpm-${ARCH}.yaml"

            nfpm pkg --config "dist/nfpm-${ARCH}.yaml" --target dist/ --packager deb

            # Clean up temp file
            rm -f "dist/mindx_${ARCH}"
          done

          ls -lh dist/*.deb 2>/dev/null || echo "No .deb packages generated"

      - name: Upload Linux packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.prepare.outputs.version }}
          FILES=""

          for f in dist/*.AppImage dist/*.deb; do
            if [ -f "$f" ]; then
              FILES="$FILES $f"
            fi
          done

          if [ -n "$FILES" ]; then
            echo "Uploading to release ${TAG}:"
            ls -lh $FILES
            gh release upload "${TAG}" $FILES --repo "${{ env.GITHUB_REPO }}" --clobber
          else
            echo "No Linux packages to upload"
          fi

      - name: Summary
        run: |
          echo "## Linux Packages Built & Uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Arch |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/*.AppImage; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | Universal |" >> "$GITHUB_STEP_SUMMARY"
          done
          for f in dist/*.deb; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | Debian/Ubuntu |" >> "$GITHUB_STEP_SUMMARY"
          done

  # ==========================================================================
  # Snap — build and push to Snap Store (stable only)
  # Generates snapcraft.yaml first, then builds.
  #
  # Requires: SNAP_STORE_TOKEN secret
  #   How to get the token:
  #     1. On Linux (or via Docker/VM): snapcraft login
  #     2. Export credentials:
  #        snapcraft export-login --snaps mindx --channels stable credentials.txt
  #     3. cat credentials.txt → copy contents → paste as GitHub Secret
  #   Reference: https://documentation.ubuntu.com/snapcraft/stable/how-to/publishing/authenticate/
  # ==========================================================================
  snap:
    name: Snap (Linux)
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.is_prerelease == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snapcraft.yaml from template
        run: |
          sed -e "s|__VERSION__|${{ needs.prepare.outputs.version_num }}|g" \
            snap/snapcraft.yaml.tpl > snap/snapcraft.yaml
          cat snap/snapcraft.yaml

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build-snap
        with:
          path: .

      - name: Publish Snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}
        run: snapcraft upload mindx_*.snap --release stable

      - name: Summary
        run: |
          echo "## Snap Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Package: \`${{ steps.build-snap.outputs.snap }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "sudo snap install mindx" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Flatpak — submit PR to Flathub (stable only)
  #
  # NOTE: First-time setup required:
  #   1. Fork https://github.com/flathub/com.dotnetage.mindx
  #      (or create it via Flathub submission process)
  #   2. Add FLATPUBBot_TOKEN secret (GitHub PAT with repo access)
  # ==========================================================================
  flatpak:
    name: Flatpak (Linux)
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux amd64 asset & get SHA256
        id: sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_NUM=${{ needs.prepare.outputs.version_num }}
          TAG=${{ needs.prepare.outputs.version }}
          mkdir -p dist

          gh release download "${TAG}" \
            --pattern "mindx-*linux-amd64.tar.gz" \
            --dir dist \
            --repo "${{ env.GITHUB_REPO }}"

          SHA=$(shasum -a 256 "dist/mindx-${VERSION_NUM}-linux-amd64.tar.gz" | cut -d' ' -f1)
          URL="https://github.com/${{ env.GITHUB_REPO }}/releases/download/${TAG}/mindx-${VERSION_NUM}-linux-amd64.tar.gz"

          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "release_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Generate Flatpak manifest
        run: |
          sed \
            -e "s|__RELEASE_URL__|${{ steps.sha256.outputs.release_url }}|g" \
            -e "s|__SHA256_AMD64__|${{ steps.sha256.outputs.sha256 }}|g" \
            scripts/flatpak-manifest.yml.tpl > com.dotnetage.mindx.flatpak-ref.yml

          cat com.dotnetage.mindx.flatpak-ref.yml

      - name: Submit to Flathub
        continue-on-error: true
        run: |
          echo "Flatpak submission requires manual setup:"
          echo "  1. Fork https://github.com/flathub/com.dotnetage.mindx"
          echo "  2. Add FLATPUBBot_TOKEN secret"
          echo "Skipping automated submission for now."

      - name: Summary
        run: |
          echo "## Flatpak" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PR submitted to Flathub (\`com.dotnetage.mindx\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "flatpak install flathub com.dotnetage.mindx" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
