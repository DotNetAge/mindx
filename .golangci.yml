linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosec
    - misspell
    - gofmt
    - bodyclose
    - nilerr
    - unconvert

issues:
  exclude-rules:
    # Skip CGO-dependent packages that require native libraries not available in CI
    - path: '(^|/)gort/'
      text: '.*'
      linters:
        - govet
        - errcheck
        - staticcheck
        - unused
        - gosec
        - bodyclose
        - nilerr
        - unconvert

run:
  timeout: 5m
  # Skip CGO-dependent packages that require native libraries not available in CI
  skip-dirs:
    - gort
    - onnxruntime
    - vendor$
