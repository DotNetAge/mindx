# golangci-lint v2 configuration
version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosec
    - misspell
    - bodyclose
    - nilerr
    - unconvert
  exclusions:
    # Skip CGO-dependent packages that require native libraries not available in CI
    paths:
      - gort$
      - onnxruntime$

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - gort$
      - onnxruntime$

issues:
  exclude-rules:
    # Skip CGO-dependent packages that require native libraries not available in CI
    - path: '(^|/)gort/'
      text: '.*'
