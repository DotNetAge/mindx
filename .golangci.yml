# golangci-lint v2 configuration
version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosec
    - misspell
    - bodyclose
    - nilerr
    - unconvert
  exclusions:
    # Skip CGO-dependent packages that require native libraries not available in CI
    paths:
      - gort$
      - onnxruntime$
      - tree-sitter$

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - gort$
      - onnxruntime$
      - tree-sitter$

# CGO-dependent packages excluded via linters.exclusions and formatters.exclusions above
