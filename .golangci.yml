# golangci-lint v2 configuration
version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosec
    - misspell
    - bodyclose
    - nilerr
    - unconvert
  exclusions:
    # CGO-dependent packages that import gorag (requires CGO_ENABLED=1)
    paths:
      - pkg/memory/
      - cmd/query\.go
      - internal/core/app\.go
      - internal/svc/daemon\.go
      - pkg/session/rag_adapter\.go

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - pkg/memory/

# CGO-dependent packages importing gorag excluded from analysis.
# Run with CGO_ENABLED=1 (default) to include these in analysis.
