# golangci-lint v2 configuration
version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosec
    - misspell
    - bodyclose
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (net/http.ResponseWriter).Write
        - os.Remove
        - os.RemoveAll
        - os.MkdirAll
        - os.WriteFile
        - os.Chmod
        - (os/exec.Cmd).Run
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Sscanf
    staticcheck:
      checks: ["all", "-SA9003", "-ST1005"]
    gosec:
      severity: high
  exclusions:
    paths:
      - pkg/memory/
      - cmd/query\.go
      - internal/core/app\.go
      - internal/svc/daemon\.go
      - pkg/session/rag_adapter\.go
    rules:
      - path: _test\.go
        linters: [errcheck, gosec]

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - pkg/memory/
